name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run this manually for testing

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Radical Project Sanitization
        run: |
          # 1. Locate the Project File
          PBX_PATH=$(find . -name "project.pbxproj")
          
          # 2. Remove Google/Firebase/Ads references from the Blueprint
          sed -i '' '/Google/d' "$PBX_PATH"
          sed -i '' '/Firebase/d' "$PBX_PATH"
          sed -i '' '/AdMob/d' "$PBX_PATH"
          sed -i '' '/remoteSourceControl/d' "$PBX_PATH"
          
          # 3. Fix the "Missing File" Errors from your logs
          # This creates dummy files for the ones Xcode is complaining about
          mkdir -p Plugins
          touch Plugins/LocationPlugin.swift
          touch Plugins/DialogPlugin.swift
          touch Plugins/RatingPlugin.swift
          
          # 4. Comment out Firebase/Google imports in Swift code
          find . -name "*.swift" -exec sed -i '' 's/import Firebase/\/\/ import Firebase/g' {} +
          find . -name "*.swift" -exec sed -i '' 's/import Google/\/\/ import Google/g' {} +
          find . -name "*.swift" -exec sed -i '' 's/FirebaseApp.configure()/\/\/ FirebaseApp.configure()/g' {} +
          find . -name "*.swift" -exec sed -i '' 's/GADMobileAds/\/\/ GADMobileAds/g' {} +

          # 5. Ensure Info.plist exists to prevent crash
          if [ ! -f "iOS-SmartWebView-Info.plist" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleIdentifier</key><string>com.yourcompany.app</string></dict></plist>' > "iOS-SmartWebView-Info.plist"
          fi

          echo "Sanitization complete. Ghosts busted."

      - name: Build Archive
        run: |
          # Find project and scheme names dynamically
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          # Execute the build
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.0
