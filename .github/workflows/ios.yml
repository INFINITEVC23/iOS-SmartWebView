name: iOS build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Default Scheme
        run: |
          # This automatically finds your project scheme
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.project.schemes[0]')
          echo "SCHEME=$SCHEME_NAME" >> $GITHUB_ENV

      - name: Build Archive
        run: |
          # Use 'archive' and 'iphoneos' SDK for a real IPA, not a simulator
          xcodebuild archive \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -configuration Release \
            -destination "generic/platform=iOS"

      - name: Export IPA
        run: |
          # This converts the archive into the actual .ipa file
          mkdir -p $GITHUB_WORKSPACE/build/output
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $GITHUB_WORKSPACE/build/output \
            -allowProvisioningUpdates

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa
          path: build/output/*.ipa
