name: Build iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Kill Hidden Dependencies
        run: |
          # This deletes the cached 'Shopping List' of Google libraries
          rm -rf iOS-SmartWebView.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          
          # This scrubs any remaining mentions in the project file
          PBX=$(find . -name "project.pbxproj")
          sed -i '' '/GoogleService/d' "$PBX"
          sed -i '' '/Firebase/d' "$PBX"
          
          echo "Dependencies reset."

      - name: Build Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          # Use 'resolved' flag to tell Xcode NOT to look for external packages
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -resolvePackageDependencies \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES
