name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Surgical Scrub of Missing Plugins
        run: |
          # 1. Remove from Project Map (pbxproj)
          find . -name "project.pbxproj" -exec sed -i '' '/LocationPlugin/d' {} +
          find . -name "project.pbxproj" -exec sed -i '' '/DialogPlugin/d' {} +
          find . -name "project.pbxproj" -exec sed -i '' '/RatingPlugin/d' {} +
          find . -name "project.pbxproj" -exec sed -i '' '/FirebasePlugin/d' {} +

          # 2. Remove from Bridging Headers (.h files)
          find . -name "*.h" -exec sed -i '' '/LocationPlugin/d' {} +
          find . -name "*.h" -exec sed -i '' '/DialogPlugin/d' {} +
          find . -name "*.h" -exec sed -i '' '/RatingPlugin/d' {} +
          find . -name "*.h" -exec sed -i '' '/FirebasePlugin/d' {} +

          # 3. Remove from Swift files (.swift)
          find . -name "*.swift" -exec sed -i '' '/LocationPlugin/d' {} +
          find . -name "*.swift" -exec sed -i '' '/DialogPlugin/d' {} +
          find . -name "*.swift" -exec sed -i '' '/RatingPlugin/d' {} +
          find . -name "*.swift" -exec sed -i '' '/FirebasePlugin/d' {} +
          
          echo "Cleanup complete. Starting build..."

      - name: Build Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
