name: Build BloxTime IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default > default_scheme
          echo "Using scheme: $default"

      - name: Build Archive
        run: |
          SCHEME=$(cat default_scheme)
          PROJECT=$(ls -d *.xcodeproj | head -n 1)
          
          # Added -skipPackagePluginValidation to stop it from hanging
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/BloxTime.xcarchive \
            -destination "generic/platform=iOS" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/BloxTime.xcarchive/Products/Applications/*.app build/Payload
          cd build && zip -vr BloxTime.ipa Payload

      - name: Upload BloxTime Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloxTime-Installer
          path: build/BloxTime.ipa
