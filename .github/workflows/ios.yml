name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Final Blueprint Cleanup
        run: |
          # This ensures that even if a 'Ghost' reference remains in the hidden project file, 
          # the build won't stop to look for it.
          PBX_FILE=$(find . -name "project.pbxproj")
          sed -i '' '/GoogleService-Info.plist/d' "$PBX_FILE"
          sed -i '' '/Firebase/d' "$PBX_FILE"
          sed -i '' '/GoogleUtilities/d' "$PBX_FILE"
          
          # Delete the Package.resolved to force a clean dependency state
          find . -name "Package.resolved" -delete
          
          echo "Blueprint sanitized for a clean build."

      - name: Build Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          # We use GENERATE_INFOPLIST_FILE=YES to avoid any manual Info.plist conflicts
          # and COMPILER_INDEX_STORE_ENABLE=NO to speed up the GitHub runner.
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES \
            COMPILER_INDEX_STORE_ENABLE=NO
