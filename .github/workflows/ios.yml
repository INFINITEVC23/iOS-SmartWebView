name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Global Search and Destroy Ghost Plugins
        run: |
          # This finds EVERY pbxproj file in the repo and cleans it
          find . -name "project.pbxproj" -exec sed -i '' '/LocationPlugin.swift/d' {} +
          find . -name "project.pbxproj" -exec sed -i '' '/DialogPlugin.swift/d' {} +
          find . -name "project.pbxproj" -exec sed -i '' '/RatingPlugin.swift/d' {} +
          find . -name "project.pbxproj" -exec sed -i '' '/FirebasePlugin.swift/d' {} +
          
          # Force remove any line containing these plugin names
          for f in $(find . -name "project.pbxproj"); do
            grep -vE "LocationPlugin|DialogPlugin|RatingPlugin|FirebasePlugin" "$f" > temp && mv temp "$f"
          done
          echo "Deep clean complete."

      - name: Build Archive
        run: |
          # Find the first .xcodeproj available anywhere
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          PROJ_BASE=$(basename "$PROJ_PATH")
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          echo "Found Project at: $PROJ_PATH"
          echo "Building Scheme: $SCHEME_NAME"
          
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
