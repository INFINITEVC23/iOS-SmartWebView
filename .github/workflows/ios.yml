name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Clean Ghost Plugins
        run: |
          PROJECT_FILE=$(find . -name "project.pbxproj" | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            echo "Purging missing plugin references..."
            sed -i '' '/LocationPlugin.swift/d' "$PROJECT_FILE" || true
            sed -i '' '/DialogPlugin.swift/d' "$PROJECT_FILE" || true
            sed -i '' '/RatingPlugin.swift/d' "$PROJECT_FILE" || true
            sed -i '' '/FirebasePlugin.swift/d' "$PROJECT_FILE" || true
            
            grep -v "LocationPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"
            grep -v "DialogPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"
            grep -v "RatingPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"
            grep -v "FirebasePlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"
          fi

      - name: Auto-Detect and Build
        run: |
          # Find the project file
          PROJECT_NAME=$(ls -d *.xcodeproj | head -n 1)
          
          # This command extracts the first available scheme from the project
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_NAME" -json | ruby -e "require 'json'; puts JSON.parse(STDIN.read)['project']['schemes'][0]")
          
          echo "Detected Scheme: $SCHEME_NAME"
          
          if [ -z "$SCHEME_NAME" ] || [ "$SCHEME_NAME" == "null" ]; then
            echo "No schemes found! Using project basename as fallback."
            SCHEME_NAME=$(basename "$PROJECT_NAME" .xcodeproj)
          fi

          xcodebuild archive \
            -project "$PROJECT_NAME" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/BloxTime.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
