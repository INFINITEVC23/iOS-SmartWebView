name: iOS build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build IPA for Signulous
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Default Scheme
        run: |
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.project.schemes[0]')
          echo "SCHEME=$SCHEME_NAME" >> $GITHUB_ENV

      - name: Build Archive (Skip Signing)
        run: |
          # We force Xcode to ignore signing so the runner doesn't crash
          xcodebuild archive \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        run: |
          mkdir -p $GITHUB_WORKSPACE/build/output
          # Exporting using the 'development' method usually works best for third-party signers
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $GITHUB_WORKSPACE/build/output \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-SmartWebView-IPA
          path: build/output/*.ipa
