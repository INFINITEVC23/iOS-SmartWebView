      - name: Create IPA (The App File)
        run: |
          # This finds your project name and scheme based on the logic you already have
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          scheme=$(cat default)
          
          # This creates the archive and packages it for Sideloadly
          xcodebuild archive -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -archivePath build/App.xcarchive -sdk iphoneos CODE_SIGNING_ALLOWED=NO
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/*.app build/Payload
          cd build && zip -r BloxTime.ipa Payload

      - name: Upload BloxTime to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: BloxTime-Installer
          path: build/BloxTime.ipa
