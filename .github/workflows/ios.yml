name: Build iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1' # Using a specific stable version

      - name: Sanitize Project Environment
        run: |
          # 1. Delete any lingering workspace or package data
          rm -rf *.xcodeproj/project.xcworkspace
          rm -rf *.xcodeproj/xcshareddata
          find . -name "Package.resolved" -delete
          
          # 2. Check for the Info.plist - If it's missing, create a dummy one 
          # to prevent the 'File Not Found' crash.
          if [ ! -f "iOS-SmartWebView-Info.plist" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > "iOS-SmartWebView-Info.plist"
          fi

      - name: Build Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          # The -clobber flag and clean action force Xcode to ignore the cache
          xcodebuild clean archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES \
            COMPILER_INDEX_STORE_ENABLE=NO
