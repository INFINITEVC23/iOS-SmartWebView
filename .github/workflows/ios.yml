name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Clean Project Map
        run: |
          # Locate the pbxproj file
          PROJECT_FILE=$(find . -name "project.pbxproj" | head -n 1)
          echo "Cleaning $PROJECT_FILE"
          
          # Remove references to the missing plugin files that cause build failures
          sed -i '' '/LocationPlugin.swift/d' "$PROJECT_FILE" || true
          sed -i '' '/DialogPlugin.swift/d' "$PROJECT_FILE" || true
          sed -i '' '/RatingPlugin.swift/d' "$PROJECT_FILE" || true
          sed -i '' '/FirebasePlugin.swift/d' "$PROJECT_FILE" || true
          
          # Purge specific UUID lines that Xcode looks for
          grep -v "LocationPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"
          grep -v "DialogPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"
          grep -v "RatingPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"
          grep -v "FirebasePlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"

      - name: Build Archive
        run: |
          # Automatically find the .xcodeproj file
          PROJECT_NAME=$(ls -d *.xcodeproj | head -n 1)
          # Use the project name (minus extension) as the default scheme
          SCHEME_NAME=$(basename "$PROJECT_NAME" .xcodeproj)
          
          echo "Building Project: $PROJECT_NAME with Scheme: $SCHEME_NAME"
          
          xcodebuild archive \
            -project "$PROJECT_NAME" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/BloxTime.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO
