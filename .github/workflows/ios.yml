name: Build BloxTime IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Nuclear Cleanup & Path Fix
        run: |
          PROJECT_FILE=$(find . -name "project.pbxproj")
          
          # 1. Purge missing plugins that cause crashes
          sed -i '' '/LocationPlugin/d' "$PROJECT_FILE" || true
          sed -i '' '/DialogPlugin/d' "$PROJECT_FILE" || true
          sed -i '' '/RatingPlugin/d' "$PROJECT_FILE" || true
          sed -i '' '/FirebasePlugin/d' "$PROJECT_FILE" || true
          sed -i '' '/Firebase/d' "$PROJECT_FILE" || true
          sed -i '' '/Google/d' "$PROJECT_FILE" || true
          
          # 2. Tell Xcode the Assets are in the Root folder
          # We change the project path to look at the top level
          sed -i '' 's/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;/ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon; ASSETCATALOG_COMPILER_SEARCH_FLAGS = "--extra-config-path $(SRCROOT)\/..";/g' "$PROJECT_FILE" || true
          
          echo "Cleanup and Root Path pointing finished."

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default > default_scheme

      - name: Build Archive
        run: |
          SCHEME=$(cat default_scheme)
          PROJECT=$(ls -d *.xcodeproj | head -n 1)
          
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/BloxTime.xcarchive \
            -destination "generic/platform=iOS" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            clean archive

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/BloxTime.xcarchive/Products/Applications/*.app build/Payload
          cd build && zip -vr BloxTime.ipa Payload

      - name: Upload BloxTime Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloxTime-Installer
          path: build/BloxTime.ipa
