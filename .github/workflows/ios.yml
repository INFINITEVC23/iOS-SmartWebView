name: iOS build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test default scheme using iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Default Scheme
        run: |
          # This automatically finds your project scheme so you don't have to guess the name
          SCHEME_NAME=$(xcodebuild -list -json | jq -r '.project.schemes[0]')
          echo "SCHEME=$SCHEME_NAME" >> $GITHUB_ENV

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest"
