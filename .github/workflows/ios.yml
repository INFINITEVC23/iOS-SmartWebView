name: "Build iOS"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Archive
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        [span_2](start_span)uses: actions/checkout@v4[span_2](end_span)

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          [span_3](start_span)xcode-version: 'latest-stable'[span_3](end_span)

      - name: Remove Ghost Plugins (Strong Cleanup)
        run: |
          # Find the project file regardless of its name
          [span_4](start_span)PROJECT_FILE=$(find . -name "project.pbxproj")[span_4](end_span)
          
          echo "Cleaning references from: $PROJECT_FILE"
          
          # 1. Delete the specific file reference lines
          [span_5](start_span)sed -i '' '/LocationPlugin.swift/d' "$PROJECT_FILE" || true[span_5](end_span)
          [span_6](start_span)sed -i '' '/DialogPlugin.swift/d' "$PROJECT_FILE" || true[span_6](end_span)
          [span_7](start_span)sed -i '' '/RatingPlugin.swift/d' "$PROJECT_FILE" || true[span_7](end_span)
          [span_8](start_span)sed -i '' '/FirebasePlugin.swift/d' "$PROJECT_FILE" || true[span_8](end_span)
          
          # 2. Purge associated UUIDs to prevent "Build input files cannot be found" errors
          [span_9](start_span)grep -v "LocationPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"[span_9](end_span)
          [span_10](start_span)grep -v "DialogPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"[span_10](end_span)
          [span_11](start_span)grep -v "RatingPlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"[span_11](end_span)
          [span_12](start_span)grep -v "FirebasePlugin" "$PROJECT_FILE" > temp && mv temp "$PROJECT_FILE"[span_12](end_span)
          
          [span_13](start_span)echo "Project map successfully purged of missing plugins."[span_13](end_span)

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default > default_scheme

      - name: Build Archive
        run: |
          SCHEME=$(cat default_scheme)
          PROJECT=$(ls -d *.xcodeproj | head -n 1)
          
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/BloxTime.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
