name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Scrub Google and Firebase from Project Blueprint
        run: |
          # Find the project file
          PBX_PATH=$(find . -name "project.pbxproj")
          
          echo "Cleaning $PBX_PATH..."
          
          # Delete the lines that mention these specific ghost files
          sed -i '' '/GoogleService-Info.plist/d' "$PBX_PATH"
          sed -i '' '/Firebase/d' "$PBX_PATH"
          sed -i '' '/GoogleUtilities/d' "$PBX_PATH"
          sed -i '' '/Protobuf/d' "$PBX_PATH"
          sed -i '' '/nanopb/d' "$PBX_PATH"
          sed -i '' '/FBLPromises/d' "$PBX_PATH"
          
          # Special: Remove the FirebasePlugin.swift reference which I saw in your file
          sed -i '' '/FirebasePlugin.swift/d' "$PBX_PATH"
          
          echo "Scrubbing complete."

      - name: Build Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES
