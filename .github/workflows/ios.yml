name: Build iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Force Delete Google Ghost References
        run: |
          # 1. Find the project blueprint file
          PBX_PATH=$(find . -name "project.pbxproj")
          echo "Found blueprint at: $PBX_PATH"
          
          # 2. Delete every line containing GoogleService or Firebase
          # This cleans lines 28, 53, 144, and 229 from your screenshot
          sed -i '' '/GoogleService/d' "$PBX_PATH"
          sed -i '' '/Firebase/d' "$PBX_PATH"
          sed -i '' '/GoogleUtilities/d' "$PBX_PATH"
          
          # 3. Force remove the package cache
          rm -rf iOS-SmartWebView.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          
          echo "Blueprint is officially De-Googled."

      - name: Build Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -usePackageBehavior=none \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES
