name: Build iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Terminate All Google Dependencies
        run: |
          # 1. Locate the project file
          PBX_PATH=$(find . -name "project.pbxproj")
          
          if [[ -f "$PBX_PATH" ]]; then
            echo "Path to project file located: $PBX_PATH"

            # 2. Delete every single line containing Google, Firebase, or Crashlytics
            sed -i '' '/Google/d' "$PBX_PATH"
            sed -i '' '/Firebase/d' "$PBX_PATH"
            sed -i '' '/Crashlytics/d' "$PBX_PATH"
            
            # 3. Remove SPM (Swift Package Manager) references that might try to pull Firebase
            sed -i '' '/remoteSourceControl/d' "$PBX_PATH"
          else
            echo "Error: Project file not found. Cannot clean Google dependencies."
            exit 1
          fi
          
          # 4. Wipe the workspace and local caches
          WORKSPACE_PATH=$(find . -name "*.xcodeproj/project.xcworkspace" | head -n 1)
          if [[ -d "$WORKSPACE_PATH" ]]; then
            rm -rf "$WORKSPACE_PATH"
          else
            echo "Warning: Workspace directory not found, skipping cleanup."
          fi
          
          echo "Google/Firebase dependencies removed successfully."

      - name: Build Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          if [[ -n "$PROJ_PATH" ]]; then
            SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
            xcodebuild archive \
              -project "$PROJ_PATH" \
              -scheme "$SCHEME_NAME" \
              -archivePath build/App.xcarchive \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              -disableAutomaticPackageResolution \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              GENERATE_INFOPLIST_FILE=YES \
              COMPILER_INDEX_STORE_ENABLE=NO
          else
            echo "Error: Xcode project not found."
            exit 1
          fi