name: Build BloxTime IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Force Project Cleanup
        run: |
          PROJECT_FILE=$(find . -name "project.pbxproj")
          
          # Delete all references to missing files in the project map
          sed -i '' '/LocationPlugin.swift/d' "$PROJECT_FILE" || true
          sed -i '' '/DialogPlugin.swift/d' "$PROJECT_FILE" || true
          sed -i '' '/RatingPlugin.swift/d' "$PROJECT_FILE" || true
          sed -i '' '/FirebasePlugin.swift/d' "$PROJECT_FILE" || true
          
          # Use Python to surgically remove any remaining broken Build Phase entries
          python3 -c "
          import os
          path = '$PROJECT_FILE'
          with open(path, 'r') as f: lines = f.readlines()
          with open(path, 'w') as f:
              for line in lines:
                  if not any(x in line for x in ['LocationPlugin', 'DialogPlugin', 'RatingPlugin', 'FirebasePlugin']):
                      f.write(line)
          "
          echo "Ghost plugins removed from project structure."

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default > default_scheme

      - name: Build Archive
        run: |
          SCHEME=$(cat default_scheme)
          PROJECT=$(ls -d *.xcodeproj | head -n 1)
          
          # We force look for the icon in the root folder as requested
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -archivePath build/BloxTime.xcarchive \
            -destination "generic/platform=iOS" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            ASSETCATALOG_COMPILER_SEARCH_FLAGS="--extra-config-path $(pwd)" \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            clean archive

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/BloxTime.xcarchive/Products/Applications/*.app build/Payload
          cd build && zip -vr BloxTime.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BloxTime-Installer
          path: build/BloxTime.ipa
