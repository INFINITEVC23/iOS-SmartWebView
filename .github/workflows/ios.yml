name: Build iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # This fixes your Node.js warning
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Surgical Ghost Removal
        run: |
          # Find the project file
          PBX_PATH=$(find . -name "project.pbxproj")
          
          # 1. Remove the actual file references that cause Exit 74
          # We use a pattern that matches the specific Xcode ID format
          sed -i '' '/GoogleService-Info.plist/d' "$PBX_PATH"
          sed -i '' '/Firebase/d' "$PBX_PATH"
          sed -i '' '/GoogleUtilities/d' "$PBX_PATH"
          
          # 2. Kill the Package references in the project file
          sed -i '' '/remoteSourceControl/d' "$PBX_PATH"
          
          # 3. Wipe the workspace data (This is often where Exit 74 hides)
          rm -rf *.xcodeproj/project.xcworkspace
          rm -rf *.xcodeproj/xcshareddata
          
          echo "Surgical cleaning finished."

      - name: Build Archive
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME_NAME=$(basename "$PROJ_PATH" .xcodeproj)
          
          xcodebuild archive \
            -project "$PROJ_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath build/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -usePackageBehavior=none \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            GENERATE_INFOPLIST_FILE=YES \
            COMPILER_INDEX_STORE_ENABLE=NO
